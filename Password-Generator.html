<!DOCTYPE html>
<html lang="en">
<head>
    <script>
const savedTheme = localStorage.getItem('theme');

if (savedTheme === 'dark') {
    document.documentElement.classList.add('dark-theme');
   
} 
else {
    document.documentElement.classList.add('light-theme');
   
}
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Password-Generator.css">
</head>
<body id="body-id">
    <header>
        <div class="header-container">
            <div class="input-seacrch-container">
            <input type="text" placeholder="Search Passwords" id="search-passwords" class="search-passwords-style">
            </div>
          <div class="change-theme-container">
              <p style="font-size: 20px;">
                Change Theme
            </p>
            <button class="change-theme-button" id="change-theme-button-id">
                🌙
            </button>
          </div>
        </div>
    </header>
    <div class="password-generator-container-all">
    <div class="password-generator-container">
      
    <h1 id="password-header">
        Password Generator
    </h1>
    <h4>
        Select The Password's Length
    </h4>
    <select class="password-length-selector-style" id="password-length-selector">
        <option value="8"> 8</option>
        <option value="9"> 9</option>
        <option value="10"> 10</option>
        <option value="11"> 11</option>
        <option value="12"> 12</option>
        <option value="13"> 13</option>
        <option value="14"> 14</option>
        <option value="15"> 15</option>
        <option value="16"> 16</option>
    </select>
    
    <p class="password-text-style"id="password-text">
        
    </p>
    <button class="generate-password-button" id="password-generator-button">
        Generate

          </button>
          <div class="options-buttons-container">
            <div>
    <button class="store-password-button" id="password-store-button">
       Store Password
    </button>
    <p id="password-stored-message" style="margin-top: 5px;font-size: 20px;"> 
        
    </p>
    </div>
    <button class="show-passwords-button" id="password-show-button">
        Show Stored Passwords
    </button>
    </button>
    <button class="reset-password-button" id="password-reset-button">
        Reset
    </button>
      </div>
    </div>
    <div class="reset-message-container-style reset-message-toggle"  id="reset-message-container">
       <p style="font-size: 20px;">
        Are you sure you want to reset everything ?
       </p>
       <div class="reset-response-buttons-contianer">
       <button class="reset-response-buttons" id="reset-button-yes-response">
        Yes
       </button>
       <button class="reset-response-buttons" id="reset-button-no-response">
        No
       </button>
       </div>
        
    </div>
    <div class="passwords-grid-container"id="passwords-grid-container-id">
        <div class="passwords-grid"> </div>
    </div>
    <script src="Password-Generator.js">

    </script>
</body>
</html>
